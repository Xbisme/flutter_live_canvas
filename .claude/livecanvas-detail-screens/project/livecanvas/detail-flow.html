<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LiveCanvas — Màn chi tiết</title>
<link rel="stylesheet" href="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/tokens/fonts.css">
<link rel="stylesheet" href="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/tokens/colors.css">
<link rel="stylesheet" href="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/tokens/typography.css">
<link rel="stylesheet" href="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/tokens/spacing.css">
<link rel="stylesheet" href="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/tokens/elevation.css">
<link rel="stylesheet" href="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-body);background:radial-gradient(120% 90% at 50% 0%,#1B1530,#0A0810 70%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  a{color:var(--iris-400);text-decoration:none}a:hover{color:var(--iris-500)}
  .phone{width:390px;height:844px;background:#000;border-radius:52px;padding:11px;box-shadow:0 40px 120px rgba(0,0,0,.6),0 0 0 2px #26203a}
  .screen{position:relative;width:100%;height:100%;background:var(--bg-app);border-radius:42px;overflow:hidden;display:flex;flex-direction:column}
  .statusbar{position:absolute;z-index:20;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 24px 0 28px;color:#F6F3FB;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.4)}
  .statusbar .t{font-family:var(--font-body);font-size:14px;font-weight:700}
  .statusbar .ic{display:flex;gap:6px;font-size:15px}
  .body{flex:1;position:relative;overflow:hidden}
  ::-webkit-scrollbar{width:0;height:0}
  .lc-drift{animation:lcDrift 14s ease-in-out infinite}
  @keyframes lcDrift{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
  .lc-blob{animation:lcBlob 9s ease-in-out infinite;will-change:transform}
  @keyframes lcBlob{0%{transform:translate(-8%,4%) scale(1)}50%{transform:translate(10%,-6%) scale(1.12)}100%{transform:translate(-8%,4%) scale(1)}}
  .lc-sheet{animation:lcSheet .28s cubic-bezier(.22,1,.36,1)}
  @keyframes lcSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .lc-toast{animation:lcToast .24s ease}
  @keyframes lcToast{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .lc-push{animation:lcPush .3s cubic-bezier(.22,1,.36,1)}
  @keyframes lcPush{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds/livecanvas-design-system-1b787378-e4c3-4b1a-ade6-0d298431ae7b/_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="Sheets.jsx"></script>
<script type="text/babel" src="Collection.jsx"></script>
<script type="text/babel" src="WallpaperDetail.jsx"></script>
<script type="text/babel" src="SetWallpaper.jsx"></script>
<script type="text/babel" src="Paywall.jsx"></script>
<script type="text/babel">
const { WallpaperDetail, Collection, ShareSheet, MoreSheet, Toast, SetWallpaper, Paywall } = window;

function StatusBar(){
  return (<div className="statusbar">
    <span className="t">9:41</span>
    <span className="ic"><i className="ph-fill ph-cell-signal-full"></i><i className="ph-fill ph-wifi-high"></i><i className="ph-fill ph-battery-full"></i></span>
  </div>);
}

function App(){
  // navigation stack: {kind:'collection', coll} | {kind:'detail', wall}
  const [stack, setStack] = React.useState([{ kind: "collection", coll: window.LC_COLL_BY_ID["c-neon"] }]);
  const [favs, setFavs] = React.useState(new Set(["w5", "w10"]));
  const [subscribed, setSubscribed] = React.useState(false);
  const [overlay, setOverlay] = React.useState(null); // setwallpaper | paywall | share | more
  const [toast, setToast] = React.useState("");
  const toastTimer = React.useRef(null);
  const top = stack[stack.length - 1];

  const push = (f) => setStack((s) => [...s, f]);
  const pop = () => setStack((s) => s.length > 1 ? s.slice(0, -1) : s);
  const openDetail = (w) => push({ kind: "detail", wall: w });
  const openCollection = (c) => push({ kind: "collection", coll: c });
  const toggleFav = (id) => setFavs((p) => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const fireToast = (t) => { setToast(t); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToast(""), 1900); };

  const wall = top.kind === "detail" ? top.wall : null;

  return (
    <div className="phone"><div className="screen">
      <StatusBar/>
      <div className="body">
        <div className="lc-push" key={stack.length + "-" + (wall ? wall.id : top.coll.id)} style={{position:"absolute",inset:0}}>
          {top.kind === "detail" && (
            <WallpaperDetail wall={wall} favorite={favs.has(wall.id)} favs={favs} subscribed={subscribed}
              onFav={() => toggleFav(wall.id)} onBack={pop}
              onSet={() => setOverlay("setwallpaper")} onPremium={() => setOverlay("paywall")}
              onShare={() => setOverlay("share")} onMore={() => setOverlay("more")}
              onOpen={openDetail} onCollection={openCollection} />
          )}
          {top.kind === "collection" && (
            <Collection coll={top.coll} favs={favs} subscribed={subscribed}
              onBack={pop} onOpen={openDetail} onFav={toggleFav}
              onShare={() => setOverlay("share")} onPremium={() => setOverlay("paywall")} />
          )}
        </div>

        {overlay === "setwallpaper" && wall &&
          <SetWallpaper wall={wall} onClose={() => setOverlay(null)} />}
        {overlay === "paywall" &&
          <Paywall onClose={() => setOverlay(null)} onBuy={() => { setSubscribed(true); setOverlay(null); fireToast("Đã kích hoạt Premium"); }} />}
        {overlay === "share" && (wall || top.kind === "collection") &&
          <ShareSheet wall={wall || { title: top.coll.title, id: top.coll.id, preview: top.coll.cover }} onClose={() => setOverlay(null)} onToast={fireToast} />}
        {overlay === "more" && wall &&
          <MoreSheet wall={wall} favorite={favs.has(wall.id)} onClose={() => setOverlay(null)}
            onFav={() => toggleFav(wall.id)} onShare={() => setOverlay("share")}
            onCollection={() => openCollection(window.LC_COLL_OF(wall.id))} onToast={fireToast} />}

        <Toast text={toast} />
      </div>
    </div></div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
